services:

  # ── PHP-FPM (Laravel) ─────────────────────────────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: ejoutiya_php
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - ejoutiya_network
    depends_on:
      postgres:
        condition: service_healthy

  # ── Nginx ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ejoutiya_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ejoutiya_network
    depends_on:
      - php

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ejoutiya_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ejoutiya
      POSTGRES_USER: ejoutiya
      POSTGRES_PASSWORD: secret
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ejoutiya_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ejoutiya -d ejoutiya"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Vue 3 Dev Server ──────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: ejoutiya_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules        # volume anonyme pour éviter override node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - ejoutiya_network

networks:
  ejoutiya_network:
    driver: bridge

volumes:
  pgdata:
